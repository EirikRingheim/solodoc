services:
  postgres:
    image: postgres:16-alpine
    container_name: solodoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: solodoc
      POSTGRES_USER: solodoc
      POSTGRES_PASSWORD: solodoc_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solodoc"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: solodoc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: solodoc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/solodoc-dev --ignore-existing;
      mc anonymous set download local/solodoc-dev;
      exit 0;
      "

  seq:
    image: datalust/seq:2024.3
    container_name: solodoc-seq
    restart: unless-stopped
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "8081:80"
      - "5341:5341"
    volumes:
      - seq-data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: solodoc-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
  minio-data:
  seq-data:
